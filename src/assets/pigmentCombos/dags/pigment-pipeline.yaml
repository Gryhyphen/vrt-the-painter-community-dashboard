---
shell: powershell
name: pigment-pipeline
description: "Pigment combo data pipeline"
schedule: ""
type: graph

steps:
  - id: extract-list
    command: |
      Get-ChildItem -Path "..\data\raw" -Filter "Pigments-*.csv" | Select-Object -ExpandProperty Name | ConvertTo-Json -Compress
    output: EXTRACT_FILES

  - id: extract
    call: extract-worker
    parallel:
      items: ${EXTRACT_FILES}
      max_concurrent: 3
    params: "FILENAME=${ITEM}"
    depends:
      - extract-list

  - id: clean-list
    command: |
      Get-ChildItem -Path "..\data\extracted" -Filter "*.json" | Select-Object -ExpandProperty Name | ConvertTo-Json -Compress
    output: CLEAN_FILES

  - id: clean
    call: clean-worker
    parallel:
      items: ${CLEAN_FILES}
      max_concurrent: 3
    params: "FILENAME=${ITEM}"
    depends:
      - clean-list

  - id: enrich
    call: enrich-worker
    params: "FILENAME=all"
    depends:
      - clean

---
shell: powershell
name: extract-worker
params:
  - FILENAME: ""
steps:
  - command: echo "Extracting ${FILENAME}"

---
shell: powershell
name: clean-worker
params:
  - FILENAME: ""
steps:
  - command: echo "Cleaning ${FILENAME}"

---
shell: powershell
name: enrich-worker
params:
  - FILENAME: ""
steps:
  - command: echo "Enriching ${FILENAME}"
